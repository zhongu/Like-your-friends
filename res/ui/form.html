<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <title>测试 - Layui</title>
  <link rel="stylesheet" href="layui/css/layui.css">
</head>

<body class="layui-bg-gray">

    <div style="">

    <div class="layui-col-xs12 layui-bg-blue"
      style="display: flex; margin: 0;height:50px; margin-bottom: 10px; position: fixed; top: 0px; left: 0px; z-index: 10;">
      <div class="layui-col-xs4" style="display: flex; ">
        <button id="asui_close" type="button" class="layui-btn layui-bg-blue" style=" margin: auto 0;">
          <i class="layui-icon layui-icon-close"></i>
        </button>
      </div>
      <div class="layui-col-xs4" style="display: flex;">
        <h4 style="margin: auto;" >输入朋友圈翻阅页数</h4>
      </div>
      <div class="layui-col-xs4" style="display: flex;">
        <button id="asui_submit" type="button" class="layui-btn layui-btn-warm layui-btn-radius" style="margin:auto; margin-right: 10px;" >确定</button>
      </div>
      
    </div>

    <div  style="left: 0px; width: 100%; overflow: scroll; padding-top: 60px; ">
      <form class="layui-form "  style="margin-left: 10px; margin-right: 10px; padding-bottom: 10px;">
  
        <div class="layui-form-item" > <!-- Hide Username Field -->
          <div class="layui-inline">
            <label class="layui-form-label">页数</label>
            <div class="layui-input-inline" style="width:100px;">
              <input id="appui_user" type="text" name="price_min" placeholder="请输入页数" autocomplete="off" class="layui-input" style="width:100px;" >
            </div>
          </div>
        </div>

        <div class="layui-form-item" style="display:none;"> <!-- Hide Group Selection Box -->
          <div class="layui-inline">
            <label class="layui-form-label">分组选择框</label>
            <div class="layui-input-inline">
              <select id="appui_choose1" name="quiz">
                <option value="">请选择问题</option>
                <optgroup label="城市记忆">
                  <option value="你工作的第一个城市">你工作的第一个城市</option>
                </optgroup>
                <optgroup label="学生时代">
                  <option value="你的工号">你的工号</option>
                  <option value="你最喜欢的老师">你最喜欢的老师</option>
                </optgroup>
              </select>
            </div>
          </div>
        </div>

        <div class="layui-form-item" style="display:none;"> <!-- Hide Single Line Selection Box -->
          <label class="layui-form-label">单行选择框</label>
          <div class="layui-input-block">
            <select id="appui_choose2" name="interest" lay-filter="aihao">
              <option value=""></option>
              <option value="0">写作</option>
              <option value="1" selected>阅读</option>
              <option value="2">游戏</option>
              <option value="3">音乐</option>
              <option value="4">旅行</option>
            </select>
          </div>
        </div>

        <div class="layui-form-item" style="display:none;"> <!-- Hide Switch -->
          <label class="layui-form-label">开关</label>
          <div class="layui-input-block">
            <input id="appui_check" type="checkbox" name="open" lay-skin="switch" lay-filter="switchTest" title="ON|OFF">
          </div>
        </div>

        <div class="layui-form-item" style="display:none;"> <!-- Hide Radio Buttons -->
          <label class="layui-form-label">单选框</label>
          <div class="layui-input-block">
            <input type="radio" name="sex" value="男" title="男" checked>
            <input type="radio" name="sex" value="女" title="女">
            <input type="radio" name="sex" value="禁" title="禁用" disabled>
          </div>
        </div>

        <div class="layui-form-item" style="display:none;"> <!-- Hide Checkboxes -->
          <label class="layui-form-label">复选框</label>
          <div class="layui-input-block">
            <input type="checkbox" name="mm" title="选项1">
            <input type="checkbox" name="mm" title="选项2" checked>
            <input type="checkbox" name="mm" title="选项3">
          </div>
        </div>

       </form>

    </div>

    </div>

  <!-- body 末尾处引入 layui -->
  <script src="layui/layui.js"></script>
  <script src="js/jquery.min.js"></script>

  <script>
    $(function(){
      $("#asui_submit").click(function(e){
        // alert('1')
        // airscript.call("1","123")
        uisubmit()
      });

      $("#asui_close").click(function(e){
        //发送关闭指令
        airscript.call("close","用户点了关闭")
        airscript.close();
      });

    });

    function uisubmit(){
        var res = {}
        res.user = $("#appui_user").val();
        res.select1 = $("#appui_choose1 option:selected").text();
        res.select2 = $("#appui_choose2 option:selected").text();
        res.check = $("#appui_check")[0].checked;
        res.radio = $("input[name='sex']:checked").val();
        var mcs = $("input[name='mm']")
        res.mcheck =[mcs[0].checked,mcs[1].checked,mcs[2].checked]

        //因为 airscript 只能传递string ,因此将对象格式化为jsonString
        resStr = JSON.stringify(res)
        //发送数据
        airscript.call("res",resStr)
        // 关闭窗口
        airscript.close();
    }

  </script>

</body>

</html>
